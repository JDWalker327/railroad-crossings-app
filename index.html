<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Railroad Crossings App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Railroad Crossings App</h1>
  <div id="rail1-tagline">A Rail 1 Application</div>

  <!-- NEW TAB BAR -->
  <div id="modeTabs" class="mode-tabs">
    <div class="tab" data-mode="projects">Projects</div>
    <div class="tab active" data-mode="lookup">Lookup</div>
  </div>

  <!-- NEW MODE HEADER + DESCRIPTION -->
  <h2 id="modeHeader" class="mode-header">Lookup Mode</h2>
<p id="modeDescription" class="mode-description">
  Search all UP crossings by DOT number or subdivision.
</p>

  <!-- PROJECTS PANEL -->
  <div id="projectsPanel" class="mode-panel" style="display:none;">
    <label>Subdivision / Project:</label>
    <select id="subdivisionSelect"></select>
  </div>

  <!-- LOOKUP PANEL -->
  <div id="lookupPanel" class="mode-panel">
    <label>DOT #:</label>
    <input id="dotSearch" type="text">

    <label style="margin-top:10px;">Subdivision search:</label>
    <input id="subdivisionSearch" type="text">
<div id="lookupResults" style="margin-top:10px;"></div>

    <button id="dotSearchBtn" style="margin-top:10px;">Lookup DOT</button>
  </div>

  <div id="status"></div>

  <div id="tableContainer" style="margin-top:20px;">
    <table id="crossingsTable" border="1" cellspacing="0" cellpadding="4">
      <thead id="crossingsTableHead"></thead>
      <tbody id="crossingsTableBody"></tbody>
    </table>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>

  <footer style="text-align:center; margin-top:20px;">
    <p>&copy; 2026 Rail 1. All rights reserved.</p>
  </footer>
</body>
</html>
