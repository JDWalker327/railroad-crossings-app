<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Railroad Crossings Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="dashboard">
        <h1>Railroad Crossings Dashboard</h1>
        <select id="crossing-selector">
            <option value="">Select a Crossing</option>
            <!-- dynamic options will be populated here -->
        </select>
        <div id="crossing-details">
            <h2>Crossing Details</h2>
            <p id="crossing-info">Information about the selected crossing will appear here.</p>
        </div>
        <button id="refresh">Refresh Data</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
