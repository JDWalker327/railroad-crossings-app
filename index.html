<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Railroad Crossings App</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Railroad Crossings App</h1>

  <!-- Watermark -->
  <div id="rail1-watermark">Powered by Rail 1</div>

  <!-- Top-level mode selector: Projects vs Lookup -->
  <div id="modeControls">
    <label for="modeSelect">Mode:</label>
    <select id="modeSelect">
      <option value="projects">Projects</option>
      <option value="lookup">Lookup</option>
    </select>
  </div>

  <!-- Project / subdivision flow (for Projects mode) -->
  <div id="projectFlow">
    <label for="projectSelect">Project:</label>
    <select id="projectSelect"></select>

    <label for="subdivisionSelect">Subdivision:</label>
    <select id="subdivisionSelect"></select>
  </div>

  <!-- Lookup flow (for Lookup mode) -->
  <div id="lookupFlow">
    <label for="crossingIdInput">Crossing ID:</label>
    <input type="text" id="crossingIdInput" placeholder="Enter Crossing ID">
    <button id="lookupButton">Lookup</button>
  </div>

  <!-- Common controls -->
  <div id="commonControls">
    <button id="refreshButton">Refresh</button>
  </div>

  <!-- Status / Messages -->
  <div id="status"></div>

  <!-- Table Container -->
  <div id="tableContainer">
    <table id="crossingsTable">
      <thead>
        <tr>
          <th>DOT #</th>
          <th>Subdivision</th>
          <th>Project</th>
          <th>Milepost</th>
          <th>Street</th>
          <th>City</th>
          <th>State</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody id="crossingsTableBody">
        <!-- Rows inserted by app.js -->
      </tbody>
    </table>
  </div>

  <!-- Supabase + app -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>

  <footer style="text-align:center; margin-top:20px;">
    <p>&copy; 2026 Rail 1. All rights reserved.</p>
  </footer>
</body>
</html>
